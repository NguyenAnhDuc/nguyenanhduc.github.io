<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duc Nguyen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        a:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.4);
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            a {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Duc Nguyen</h1>
        
        <div class="links">
            <a href="mailto:ducna01120@gmail.com">ducna01120@gmail.com</a>
            <a href="https://github.com/NguyenAnhDuc" target="_blank" rel="noopener">GitHub</a>
            <a href="/tech-daily/">Tech Daily</a>
        </div>
    </div>
</body>
</html>
